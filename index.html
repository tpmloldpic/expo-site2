<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>公館自來水源地</title>

<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
    background:#000;
  }

  /* ✅ 滿版背景：你的 JPG + 漸層疊加（高級、字清楚） */
  .hero{
  position: relative;
  min-height: 100vh;
  padding: 24px 16px 44px;

  background:
    linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.45)),
    url("images/bg.jpg");

  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}

  /* 內容區 */
  .hero-content{
    position: relative;
    max-width: 900px;
    margin: 0 auto;
    color: #fff;
  }

  /* 標題置中 */
  .hero-title{
    text-align:center;
    font-size: 34px;
    font-weight: 800;
    margin: 8px 0 18px;
    letter-spacing: .5px;
    text-shadow: 0 6px 18px rgba(0,0,0,.45);
  }

  /* 影片滿寬 + 更漂亮 */
  .video{
    width: 100%;
    border-radius: 16px;
    background: #000;
    box-shadow: 0 14px 40px rgba(0,0,0,.35);
    outline: 1px solid rgba(255,255,255,.10);
  }

  /* ✅ 文字放大 + 玻璃卡片感（手機很好讀） */
  .hero-text{
    margin-top: 18px;
    font-size: 20px;
    line-height: 1.95;
    padding: 18px 18px;
    border-radius: 16px;

    background: rgba(0,0,0,.38);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(4px);

    text-shadow: 0 2px 10px rgba(0,0,0,.25);
  }

  /* 電腦版再更舒服 */
  @media (min-width: 768px){
    .hero{ padding: 44px 24px 64px; }
    .hero-title{ font-size: 44px; margin-bottom: 22px; }
    .hero-text{ font-size: 22px; padding: 22px 22px; }
  }
</style>
</head>

<body>
  <div class="hero">
    <div class="hero-content">
      <h2 class="hero-title">公館自來水源地</h2>

      <video class="video" controls playsinline>
        <source src="videos/demo.mp4" type="video/mp4">
        你的瀏覽器不支援影片播放
      </video>

      <div class="hero-text">
        日治時期明治40年（1907年），依巴爾頓先生生前之建議，
        在今公館小觀音山腳下新店溪畔建取水口，以引取原水；
        在山麓設淨水場，進行淨水處理，再將處理過之清水，
        以抽水機抽送至山上之配水池，藉由重力方式自然流下，
        供應住戶日常用水。
      </div>
    </div>
  </div>
</body>
</html>
